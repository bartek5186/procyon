services:
  app:
    container_name: procyon-api
    build:
      context: .
      dockerfile: Dockerfile
    image: procyon-api:local
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    command: ["/app/procyon-server", "-migrate=true"]
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
    volumes:
      - ./config/config.docker.json:/app/config/config.json:ro
      - app-logs:/app/log
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mysql:
    container_name: procyon-mysql
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: procyon
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  app-logs:
  mysql-data:
